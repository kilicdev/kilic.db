name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  MONGOMS_DOWNLOAD_DIR: ${{ runner.temp }}/mongodb-binaries

jobs:
  test:
    name: Test on Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ['20.19.x', 22.x, 24.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Cache MongoDB binary
        uses: actions/cache@v4
        with:
          path: ${{ env.MONGOMS_DOWNLOAD_DIR }}
          key: ${{ runner.os }}-${{ runner.arch }}-mongodb-memory-server-8.2.6

      - name: Install Dependencies
        run: npm ci

      - name: Type Check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Verify dist output
        run: |
          test -f dist/index.js   || (echo "dist/index.js missing" && exit 1)
          test -f dist/index.d.ts || (echo "dist/index.d.ts missing" && exit 1)
          echo "Build output verified"

      - name: Verify package contents
        run: npm pack --dry-run
