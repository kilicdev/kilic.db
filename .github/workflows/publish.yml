name: Publish to NPM

on:
  release:
    types: [published]

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: TypeScript Type Check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/index.js   || (echo "❌ dist/index.js missing" && exit 1)
          test -f dist/index.d.ts || (echo "❌ dist/index.d.ts missing" && exit 1)
          echo "✅ Build output verified"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      id-token: write   

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (with npm auth)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Verify version matches release tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          RELEASE_TAG="${{ github.ref_name }}"
          EXPECTED_VERSION="${RELEASE_TAG#v}"
          
          if [ "$PKG_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "❌ Version mismatch!"
            echo "   package.json: $PKG_VERSION"
            echo "   Release tag:  $EXPECTED_VERSION"
            echo ""
            echo "→ package.json version'ını güncelleyip release'i tekrar oluştur."
            exit 1
          fi
          echo "✅ Version match: $PKG_VERSION"

      - name: Publish to NPM
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}